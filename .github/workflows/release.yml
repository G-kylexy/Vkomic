name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: win-x64-setup
            asset_ext: exe
          - os: macos-14
            target: aarch64-apple-darwin
            name: mac-arm64
            asset_ext: dmg
          - os: macos-14
            target: x86_64-apple-darwin
            name: mac-x64
            asset_ext: dmg
          - os: macos-14
            target: x86_64-apple-darwin
            name: mac-x64-highsierra
            asset_ext: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
            asset_ext: AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri App
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: ${{ contains(matrix.name, 'highsierra') && '10.13' || (matrix.target == 'x86_64-apple-darwin' && '10.15' || '') }}
          VITE_LEGACY_BUILD: ${{ contains(matrix.name, 'highsierra') && 'true' || '' }}
          RUSTFLAGS: ${{ contains(matrix.name, 'highsierra') && '-C link-arg=-Wl,-weak_framework,Foundation -C link-arg=-Wl,-weak_framework,CFNetwork -C link-arg=-Wl,-weak_framework,Security' || '' }}
        with:
          args: --target ${{ matrix.target }}

      - name: Stage desktop asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final_assets
          VERSION=$(node -p "require('./package.json').version")

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            FILEPATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/nsis" -maxdepth 1 -type f -name "*.exe" | head -n 1)
          elif [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            FILEPATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/appimage" -maxdepth 1 -type f -name "*.AppImage" | head -n 1)
          else
            FILEPATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -type f -name "*.dmg" | head -n 1)
          fi

          if [ -z "${FILEPATH:-}" ]; then
            echo "No asset found for ${{ matrix.name }}" >&2
            exit 1
          fi

          cp "$FILEPATH" "final_assets/vkomic-${VERSION}-${{ matrix.name }}.${{ matrix.asset_ext }}"

      - name: Upload desktop asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: final_assets/*
          retention-days: 7

  build-android:
    name: Build android-apk
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973"

      - name: Export Android environment
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "NDK_HOME=$SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Initialize Android project
        run: npx tauri android init --ci --skip-targets-install

      - name: Build Android APK
        run: npm run mobile:android -- --apk --target aarch64 --ci

      - name: Stage Android APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final_assets
          APK_PATH=$(find src-tauri -type f -path "*/outputs/apk/*release/*.apk" | head -n 1)

          if [ -z "${APK_PATH:-}" ]; then
            echo "No release APK found" >&2
            find src-tauri -type f -name "*.apk"
            exit 1
          fi

          cp "$APK_PATH" "final_assets/Vkomic.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: release-android-apk
          path: final_assets/*
          retention-days: 7

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-desktop
      - build-android
    runs-on: ubuntu-22.04

    steps:
      - name: Download staged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: final_assets

      - name: Verify staged assets
        shell: bash
        run: |
          set -euo pipefail
          ls -la final_assets
          test -n "$(find final_assets -maxdepth 1 -type f | head -n 1)"

      - name: Create and upload release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Notes de mise a jour
            - Nouvelle application desktop basee sur Tauri 2.
            - Navigation VK restructuree avec Browser, Downloads, Library et Settings.
            - Amelioration du parsing VK, de la recherche et des breadcrumbs.
            - Publication multi-plateforme avec Windows, macOS, Linux et Android.

            ## Binaires
            - Windows: vkomic-<version>-win-x64-setup.exe
            - macOS Intel: vkomic-<version>-mac-x64.dmg
            - macOS High Sierra: vkomic-<version>-mac-x64-highsierra.dmg
            - macOS Silicon: vkomic-<version>-mac-arm64.dmg
            - Linux: vkomic-<version>-linux-x64.AppImage
            - Android: Vkomic.apk
          files: final_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
