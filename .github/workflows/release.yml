name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: win-x64-setup
            asset_ext: exe
          - os: macos-14
            target: aarch64-apple-darwin
            name: mac-arm64
            asset_ext: dmg
          - os: macos-14
            target: x86_64-apple-darwin
            name: mac-x64
            asset_ext: dmg
          - os: macos-14
            target: x86_64-apple-darwin
            name: mac-x64-highsierra
            asset_ext: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
            asset_ext: AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri App
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: ${{ contains(matrix.name, 'highsierra') && '10.13' || (matrix.target == 'x86_64-apple-darwin' && '10.15' || '') }}
          VITE_LEGACY_BUILD: ${{ contains(matrix.name, 'highsierra') && 'true' || '' }}
          RUSTFLAGS: ${{ contains(matrix.name, 'highsierra') && '-C link-arg=-Wl,-weak_framework,Foundation -C link-arg=-Wl,-weak_framework,CFNetwork -C link-arg=-Wl,-weak_framework,Security' || '' }}
        with:
          args: --target ${{ matrix.target }}

      - name: Stage desktop asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final_assets
          VERSION=$(node -p "require('./package.json').version")

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            FILEPATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/nsis" -maxdepth 1 -type f -name "*.exe" | head -n 1)
          elif [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            FILEPATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/appimage" -maxdepth 1 -type f -name "*.AppImage" | head -n 1)
          else
            FILEPATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -type f -name "*.dmg" | head -n 1)
          fi

          if [ -z "${FILEPATH:-}" ]; then
            echo "No asset found for ${{ matrix.name }}" >&2
            exit 1
          fi

          cp "$FILEPATH" "final_assets/vkomic-${VERSION}-${{ matrix.name }}.${{ matrix.asset_ext }}"

      - name: Upload desktop asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: final_assets/*
          retention-days: 7

  build-android:
    name: Build android-apk
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout mobile branch
        uses: actions/checkout@v4
        with:
          ref: mobile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Stage Android APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final_assets
          APK_PATH=$(find android/app/build/outputs/apk/release -type f -name "*.apk" | head -n 1)

          if [ -z "${APK_PATH:-}" ]; then
            echo "No release APK found" >&2
            exit 1
          fi

          cp "$APK_PATH" "final_assets/Vkomic.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: release-android-apk
          path: final_assets/*
          retention-days: 7

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-desktop
      - build-android
    runs-on: ubuntu-22.04

    steps:
      - name: Download staged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: final_assets

      - name: Verify staged assets
        shell: bash
        run: |
          set -euo pipefail
          ls -la final_assets
          test -n "$(find final_assets -maxdepth 1 -type f | head -n 1)"

      - name: Create and upload release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          body: |
            Compatibilité macOS High Sierra : fix de l'affichage et du blur sur Safari 11.
            Amelioration de l'affichage des titres alternatifs qui se dupliquaient ,et fix des breadcrumbs.
            Ajout d'un bouton pour ouvrir la collection directement dans VK (merci @dragouf).
          files: final_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
